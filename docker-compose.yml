version: '3.8'

services:
  web:
    image: ghcr.io/your-github-username/your-repo-name:latest
    container_name: dyad-app-web
    ports:
      - '3000:3000'
    volumes:
      # Option A — Host path bind mount (recommended for TrueNAS / Unraid / etc.)
      # Replace with the absolute path to a directory on your host/NAS:
      # - /mnt/pool/dataset/appdata/tower-network:/app/data
      #
      # Option B — Docker named volume (works on standard Docker / Docker Compose)
      - dyad_db_data:/app/data
    environment:
      NODE_ENV: production
      # EXTERNAL_API_URL_SERVICE1: 'https://api.your-primary-service.com'
      # EXTERNAL_API_URL_SERVICE2: 'https://api.your-payment-gateway.com'
      # WEATHER_API_URL: 'https://api.your-weather-provider.com/v1'
      # TIME_GOV_API_URL: 'https://time.gov/'
      # DASHBOARD_PASSWORD: 'set-a-strong-dashboard-password'
    restart: unless-stopped

# Only needed if using Option B (named volume) above.
# Remove or comment out this section if using Option A (host path).
volumes:
  dyad_db_data:
